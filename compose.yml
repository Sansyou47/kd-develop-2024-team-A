services:
  flask:
    build:
      context: ./python
      dockerfile: Dockerfile-flask
    container_name: flask
    volumes:
      - ./python/app:/app
      - staticvolume:/usr/local/src/static/css:ro
      - templatesvolume:/app/templates:rw
    ports:
      - "80:5000"
    environment:
      gemini_api_key: ${gemini_api_key}
    # depends_on:
    #   - db

  tailwind:
    build:
      context: ./python
      dockerfile: Dockerfile-tailwind
    container_name: tailwind
    platform: linux/amd64
    volumes:
      - staticvolume:/app/static/css:rw
      - templatesvolume:/app/templates:ro
    tty: true

